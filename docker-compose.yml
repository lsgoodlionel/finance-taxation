services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_taxation
      POSTGRES_PASSWORD: finance_taxation
      POSTGRES_DB: finance_taxation_v2
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_taxation -d finance_taxation_v2"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env.docker
    ports:
      - "3100:3100"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/apps/api/data/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
