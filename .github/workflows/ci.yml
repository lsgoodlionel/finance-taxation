name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  unit-and-tools:
    name: Typecheck, Unit, And V4 Tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:v2

      - name: Run API tests
        run: npm run test:api

      - name: Run web tests
        run: npm run test:web

      - name: Run V4 tool tests
        run: npm run test:v4:tools

      - name: Verify V4 progress board markers
        run: npm run check:progress

  v4-acceptance:
    name: V4 Baseline Acceptance
    runs-on: ubuntu-latest
    needs:
      - unit-and-tools

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start isolated V4 stack
        run: npm run v4:test:setup

      - name: Run workflow DB contracts
        run: npm run test:db

      - name: Run API integration tests
        run: npm run test:api:integration

      - name: Run V4 browser acceptance
        run: npm run test:e2e

      - name: Dump API container diagnostics
        if: always()
        run: |
          echo "=== container states ==="
          docker ps -a --filter "name=finance-taxation-v4-test" --format '{{.Names}}\t{{.Status}}' || true
          echo "=== api inspect ==="
          docker inspect finance-taxation-v4-test-api-1 --format 'state={{.State.Status}} exitCode={{.State.ExitCode}} oomKilled={{.State.OOMKilled}} restarts={{.RestartCount}}' || true
          echo "=== api logs (tail 250) ==="
          docker logs --tail 250 finance-taxation-v4-test-api-1 2>&1 || true
          echo "=== web/nginx logs (tail 80) ==="
          docker logs --tail 80 finance-taxation-v4-test-web-1 2>&1 || true

      - name: Generate acceptance report
        run: npm run v4:report

      - name: Initialize V4 ops sources
        run: npm run v4:ops:init-sources

      - name: Generate V4 production gate evidence
        run: npm run v4:ops

      - name: Check load gate
        run: npm run test:load

      - name: Check backup and restore gate
        run: npm run test:backup-restore

      - name: Check connectors gate
        run: npm run test:connectors

      - name: Check AI evals gate
        run: npm run test:ai-evals

      - name: Check required V4 artifacts
        run: node tools/v4/check-plan-artifacts.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            artifacts/v4

      - name: Stop isolated V4 stack
        if: always()
        run: npm run v4:test:stack:stop
