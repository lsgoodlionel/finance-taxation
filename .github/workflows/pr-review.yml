name: PR Review Summary

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-summary:
    name: Post PR Review Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build summary body
        id: summary
        run: |
          cat <<'EOF' > pr-review-summary.md
          ## 自动审查摘要

          这条 PR 会自动执行以下检查：

          - 前端脚本语法校验：`src/scripts/app.js`
          - 后端源码语法校验：`backend/src/**/*.js`
          - 后端 JSON 数据文件结构校验：`backend/data/*.json`
          - 关键交付文件存在性校验

          当前自动审查的边界：

          - 只覆盖静态语法、基础结构和数据文件有效性
          - 不替代人工代码评审
          - 不替代业务合规、税务口径和会计处理复核
          - 不包含正式端到端 UI 自动化测试

          合并前仍建议人工重点核查：

          - 财税口径是否与目标业务一致
          - 单据、附件、权限、账簿和报表之间的联动是否符合预期
          - 新增接口是否引入数据隔离或权限绕过风险
          EOF
          {
            echo "body<<EOF"
            cat pr-review-summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.summary.outputs.body }}
        with:
          script: |
            const marker = "<!-- codex-pr-review-summary -->";
            const body = `${marker}\n${process.env.REVIEW_BODY}`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }
