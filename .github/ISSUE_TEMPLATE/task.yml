name: V2 Task
description: Create a workstream task for Sprint execution.
title: "[TASK] "
labels:
  - task
body:
  - type: input
    id: task_id
    attributes:
      label: Task ID
      description: Use the format from docs/v2-development-plan.md
      placeholder: TASK-00-01
    validations:
      required: true
  - type: input
    id: workstream
    attributes:
      label: Workstream
      placeholder: WS0
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: State exactly what this task owns.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands, screenshots, or API checks.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Blockers
