server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — 所有路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理转发到后端容器
    location /api/ {
        proxy_pass http://api:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE 流式响应所需
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
